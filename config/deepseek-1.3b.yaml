# SharedLoRA config for deepseek-coder-1.3b-base
model_name: deepseek-ai/deepseek-coder-1.3b-base
device: 0

# Layer selection
num_editable_layers: 8

# LoRA config
rank: 4
lora_alpha: 16
lora_dropout: 0.1
target_modules: ["q_proj", "v_proj"]

# Training
lr: 0.0002
weight_decay: 0.01
num_epochs: 5
batch_size: 2
patience: 3

# Evaluation
max_gen_length: 50
